name: On-Demand Rule Sync

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - INFO
          - DEBUG

jobs:
  sync-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Exits 1 if any operation fails — commit and push steps will not run.
      - name: Pull latest rules from CrowdStrike API
        id: sync
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_BASE_URL: ${{ secrets.FALCON_BASE_URL }}
          LOG_LEVEL: ${{ inputs.log_level }}
        run: python scripts/sync_detections.py

      # Only reached if the sync step exited 0.
      - name: Check for changes
        id: diff
        run: |
          git add rules/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "## ✅ No Changes" >> $GITHUB_STEP_SUMMARY
            echo "Local rule files already match the CrowdStrike API." >> $GITHUB_STEP_SUMMARY
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "## 📋 Rule File Changes" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --staged --stat >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Files affected" >> $GITHUB_STEP_SUMMARY
            git diff --staged --name-status >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit synced rule files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: on-demand sync from CrowdStrike API [skip ci]"

      - name: Pull and rebase before push
        if: steps.diff.outputs.changed == 'true'
        run: git pull --rebase origin main

      - name: Push synced rule files
        if: steps.diff.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
