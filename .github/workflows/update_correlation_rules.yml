name: Update Correlation Rules

on:
  push:
    branches:
      - main
    paths:
      - 'rules/**.json'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - INFO
          - DEBUG

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # sync_detections.py exits 1 if any create/update/delete fails.
      # The step fails here — commit and push steps below will not run.
      - name: Sync rules with CrowdStrike API
        id: sync
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_BASE_URL: ${{ secrets.FALCON_BASE_URL }}
          LOG_LEVEL: ${{ inputs.log_level || vars.LOG_LEVEL || 'INFO' }}
        run: python scripts/sync_detections.py

      # Only reached if the sync step exited 0 (all operations succeeded).
      - name: Commit synced rule files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rules/
          git diff --staged --quiet || git commit -m "chore: sync rule files from CrowdStrike API [skip ci]"

      - name: Pull and rebase before push
        run: git pull --rebase origin main

      - name: Push synced rule files
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
